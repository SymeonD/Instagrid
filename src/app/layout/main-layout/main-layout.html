<app-header></app-header>

<div class="main">
  <!-- Left panel: crop editor + file info + actions -->
  <div class="left-column" [class.show]="isLeftColumnOpen">
    <!-- Mobile close handle -->
    <div class="panel-handle" (click)="toggleLeftColumn()">
      <div class="handle-bar"></div>
    </div>
    <left-column></left-column>
  </div>

  <!-- Center: the grid -->
  <div class="center-column">
    <app-grid></app-grid>
  </div>

  <!-- Right panel: image library (draggable on mobile) -->
  <div class="right-column"
    [style.transform]="sheetTransform"
    [style.transition]="sheetTransition">
    <!-- Mobile drag handle -->
    <div class="panel-handle"
      (touchstart)="onSheetTouchStart($event)"
      (touchmove)="onSheetTouchMove($event)"
      (touchend)="onSheetTouchEnd()"
      (click)="!sheetDragging && isRightColumnOpen && toggleRightColumn()">
      <div class="handle-bar"></div>
    </div>
    <right-column></right-column>
  </div>

  <!-- Import modal -->
  @if (showImportPrompt) {
    <import-prompt
      [image]="modalImage"
      (close)="closeImportPrompt()">
    </import-prompt>
  }

  <!-- Mobile backdrop -->
  @if (isLeftColumnOpen || isRightColumnOpen) {
    <div class="modal-backdrop" (click)="onOutsideClick()"></div>
  }

  <!-- Mobile: floating library open button -->
  <button class="mobile-lib-btn" (click)="toggleRightColumn()" aria-label="open library"
    [class.hidden]="isRightColumnOpen || isLeftColumnOpen">
    <mat-icon>photo_library</mat-icon>
    <span>Library</span>
  </button>
</div>

<router-outlet />
