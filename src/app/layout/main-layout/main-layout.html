<app-header></app-header>

<div class="main">
  <!-- Left panel: crop editor + file info + actions -->
  <div class="left-column" [class.show]="isLeftColumnOpen">
    <!-- Mobile close handle -->
    @if (selectedImage) {
      <div class="panel-handle">
        <button class="panel-close-btn" (click)="toggleLeftColumn()" aria-label="close panel">
          <mat-icon>keyboard_arrow_down</mat-icon>
        </button>
      </div>
    }
    <left-column></left-column>
  </div>

  <!-- Center: the grid -->
  <div class="center-column">
    <app-grid></app-grid>
  </div>

  <!-- Right panel: image library -->
  <div class="right-column" [class.show]="isRightColumnOpen">
    <!-- Mobile close handle -->
    <div class="panel-handle">
      <button class="panel-close-btn" (click)="toggleRightColumn()" aria-label="close panel">
        <mat-icon>keyboard_arrow_down</mat-icon>
      </button>
    </div>
    <right-column></right-column>
  </div>

  <!-- Import modal -->
  @if (showImportPrompt) {
    <import-prompt
      [image]="modalImage"
      (close)="closeImportPrompt()">
    </import-prompt>
  }

  <!-- Mobile backdrop -->
  @if (isLeftColumnOpen || isRightColumnOpen) {
    <div class="modal-backdrop" (click)="onOutsideClick()"></div>
  }

  <!-- Mobile: library open button -->
  <button class="mobile-lib-btn drawer-button" (click)="toggleRightColumn()" aria-label="open library">
    <mat-icon>photo_library</mat-icon>
    <span>Library</span>
  </button>
</div>

<router-outlet />
