<div class="modal-backdrop" (click)="close.emit()"></div>

<div class="modal-box">
  <div class="modal-topbar">
    <span class="modal-title">Import Image</span>
    <button class="modal-close-btn" (click)="close.emit()" aria-label="close">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- ── Desktop: two-column layout ── -->
  <div class="desktop-body">
    <div class="modal-crop-side">
      @if (cropGridImg) {
        <crop-editor
          [gridImg]="cropGridImg"
          (cropChange)="onCropChange($event)"
        ></crop-editor>
      }
    </div>

    <div class="modal-controls-side">
      <p class="controls-label">Cut</p>
      <div class="cut-grid" (mouseleave)="onPlaceholderHover(-1)">
        @for (size of [1,2,3,4,5,6,7,8,9]; track size; let i = $index) {
          <div class="cut-cell"
            [class.darkened]="isDarkened(i)"
            [class.selected]="isSelected(i)"
            (mouseenter)="onPlaceholderHover(i)"
            (click)="onPlaceholderClick(i)">
          </div>
        }
      </div>

      <div class="modal-actions">
        <button class="btn-import" (click)="sendImage()">Import</button>
        <div class="modal-btn-row">
          <button class="btn-icon-ghost" (click)="downloadImages()" title="Download">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button class="btn-icon-danger" (click)="deleteImage()" title="Delete">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Mobile: step-based layout ── -->
  <div class="mobile-body">
    <div class="step-indicator">
      <div class="step-dot" [class.active]="mobileStep === 1"></div>
      <div class="step-dot" [class.active]="mobileStep === 2"></div>
    </div>

    <!-- Step 1: Cut selector -->
    <div class="mobile-step" [class.hidden]="mobileStep !== 1">
      <p class="controls-label">Choose a cut</p>
      <div class="cut-grid" (mouseleave)="onPlaceholderHover(-1)">
        @for (size of [1,2,3,4,5,6,7,8,9]; track size; let i = $index) {
          <div class="cut-cell"
            [class.darkened]="isDarkened(i)"
            [class.selected]="isSelected(i)"
            (mouseenter)="onPlaceholderHover(i)"
            (click)="onPlaceholderClick(i)">
          </div>
        }
      </div>
      <button class="btn-next" (click)="nextStep()">Next →</button>
    </div>

    <!-- Step 2: Crop editor -->
    <div class="mobile-step" [class.hidden]="mobileStep !== 2">
      @if (cropGridImg) {
        <crop-editor
          [gridImg]="cropGridImg"
          (cropChange)="onCropChange($event)"
        ></crop-editor>
      }
      <div class="mobile-actions">
        <button class="btn-back" (click)="prevStep()">← Back</button>
        <button class="btn-import" (click)="sendImage()">Import</button>
        <button class="btn-icon-ghost" (click)="downloadImages()" title="Download">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="btn-icon-danger" (click)="deleteImage()" title="Delete">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>
