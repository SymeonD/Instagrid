<div class="grid" id="image-grid-container">
    <ktd-grid [cols]="cols"
            [backgroundConfig]="gridBackgroundConfig"
            [rowHeight]="rowHeight"
            [height]="height"
            [layout]="layout"
            [gap]="3"
            [selectedItemsIds]="selectedItems"
            (dragStarted)="onDragStarted($event)"
            (dragEnded)="onDragEnded($event)"
            (resizeStarted)="onResizeStarted($event)"
            (resizeEnded)="onResizeEnded($event)"
            (layoutUpdated)="onLayoutUpdated($event)"
            (click)="onGridClick($event)">
        @for (item of layout; track item.id) {
            <ktd-grid-item
                [id]="item.id"
                [dragStartThreshold]="isMobile() ? 15 : 0"
                [resizable]="!isMobile()"
                [ngClass]="{
                    'grid-item-content--selected': isItemSelected(item),
                    'grid-item-resize-active': resizeActiveItemId === item.id
                }"
                (pointerdown)="onItemPointerDown($event, item)"
                (pointermove)="onItemPointerMove($event)"
                (pointerup)="onItemPointerUp($event, item)"
                (pointercancel)="onPointerCancel()">
                <img [src]="item.croppedSrc || item.globalGridImg.lowResSrc"
                     [alt]="item.globalGridImg.alt"
                     style="width: 100%; height: 100%; object-fit: cover; pointer-events: none; -webkit-user-drag: none;" />
                @if (isMobile()) {
                    <div class="resize-corner"
                         (pointerdown)="onCornerPointerDown($event, item)">
                    </div>
                }
            </ktd-grid-item>
        }
    </ktd-grid>
</div>
