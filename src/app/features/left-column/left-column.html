@if (!selectedImage) {
  <div class="panel-empty">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
    </svg>
    <p>Select an image to edit</p>
  </div>
}

@if (selectedImage) {
  <div class="panel-selected">
    <p class="panel-section-title">Crop</p>
    <div class="crop-zone">
      <crop-editor
        [gridImg]="selectedImage"
        (cropChange)="onCropChange($event)"
      ></crop-editor>
    </div>

    <div class="panel-info">
      <div class="info-filename">{{ selectedImage.globalGridImg.alt || 'Image' }}</div>
      <div class="info-meta">{{ selectedImage.w }} × {{ selectedImage.h }} cells</div>
      <div class="badge-row">
        <span class="badge">{{ selectedImage.w * 4 }}:{{ selectedImage.h * 5 }}</span>
        <span class="badge">×{{ selectedImage.cropZoom | number:'1.1-2' }} zoom</span>
      </div>
    </div>

    <div class="panel-actions">
      <button class="btn-export" (click)="downloadImage()">
        Export
      </button>
      <div class="btn-row">
        <button class="btn-sm-ghost" (click)="downloadImage()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </button>
        <button class="btn-sm-danger" (click)="deleteImage()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Delete
        </button>
      </div>
    </div>
  </div>
}
