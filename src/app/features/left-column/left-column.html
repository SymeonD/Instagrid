<div class="selected-image-container" *ngIf="selectedImage">
    <div class="image-preview">
        <crop-editor
            [gridImg]="selectedImage"
            (cropChange)="onCropChange($event)"
        ></crop-editor>
    </div>
    <div class="image-controls">
        <button aria-label="download-button" matButton="elevated" class="download-button" (click)="downloadImage()">
            Download Image <mat-icon>download</mat-icon>
        </button>
        <button aria-label="delete-button" class="delete-button" (click)="deleteImage()">
            <mat-icon>delete</mat-icon>
        </button>
    </div>
</div>
