<div class="right-column">
  <div class="lib-header">
    <span class="lib-title">Library</span>
  </div>

  <div class="lib-grid">
    <!-- Add image placeholder — always first -->
    <div class="lib-item lib-add" (click)="importImages()" title="Add image">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span class="lib-add-label">Add</span>
    </div>

    @for (image of images; track image.id) {
      @if (image.lowResSrc) {
        <div class="lib-item" (click)="openImportPrompt(image)">
          <img [src]="image.lowResSrc" [alt]="image.alt" />
        </div>
      } @else {
        <div class="lib-item lib-loading" title="{{ image.alt }}">
          <div class="lib-loading-spinner"></div>
        </div>
      }
    }
  </div>
</div>
